<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppStore Publisher</title>
<style>
:root {
  --primary: #4A90D9;
  --primary-dark: #357ABD;
  --primary-light: #E8F0FE;
  --success: #34A853;
  --success-light: #E6F4EA;
  --danger: #EA4335;
  --danger-light: #FCE8E6;
  --warning: #FBBC05;
  --warning-light: #FEF7E0;
  --gray-50: #F8F9FA;
  --gray-100: #F1F3F4;
  --gray-200: #E8EAED;
  --gray-300: #DADCE0;
  --gray-400: #BDC1C6;
  --gray-500: #9AA0A6;
  --gray-600: #80868B;
  --gray-700: #5F6368;
  --gray-800: #3C4043;
  --gray-900: #202124;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
  --font: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font);
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
}

/* ─── Header ─── */
.header {
  background: white;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 32px;
  display: flex;
  align-items: center;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  margin-right: 40px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-logo span { font-size: 22px; }

/* ─── Top Nav ─── */
.nav-tabs {
  display: flex;
  gap: 0;
  height: 100%;
}
.nav-tab {
  padding: 0 20px;
  height: 100%;
  display: flex;
  align-items: center;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-600);
  border-bottom: 2px solid transparent;
  transition: all .2s;
  user-select: none;
}
.nav-tab:hover {
  color: var(--gray-800);
  background: var(--gray-50);
}
.nav-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
  background: var(--primary-light);
}

/* ─── Main Container ─── */
.container {
  max-width: 900px;
  margin: 24px auto;
  padding: 0 20px;
}

/* ─── Page ─── */
.page { display: none; }
.page.active { display: block; }

/* ─── Card ─── */
.card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 20px;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--gray-800);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ─── Store Tabs (settings) ─── */
.store-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--gray-200);
  margin-bottom: 20px;
}
.store-tab {
  padding: 10px 18px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-600);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all .15s;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
}
.store-tab:hover {
  color: var(--gray-800);
  background: var(--gray-50);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
}
.store-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
.store-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gray-400);
}
.store-tab.enabled .store-dot { background: var(--success); }

/* ─── Form ─── */
.form-group {
  margin-bottom: 16px;
}
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-700);
  margin-bottom: 6px;
}
.form-input, .form-textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--gray-300);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font);
  color: var(--gray-900);
  background: white;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.form-input:focus, .form-textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,144,217,.15);
}
.form-textarea {
  min-height: 100px;
  resize: vertical;
}

/* ─── Toggle Switch ─── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--gray-100);
}
.toggle-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-800);
}
.toggle-desc {
  font-size: 12px;
  color: var(--gray-500);
  margin-top: 2px;
}
.toggle {
  position: relative;
  width: 44px; height: 24px;
  flex-shrink: 0;
}
.toggle input {
  opacity: 0;
  width: 0; height: 0;
}
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--gray-300);
  border-radius: 12px;
  cursor: pointer;
  transition: background .2s;
}
.toggle-slider::before {
  content: "";
  position: absolute;
  width: 18px; height: 18px;
  left: 3px; top: 3px;
  background: white;
  border-radius: 50%;
  transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.15);
}
.toggle input:checked + .toggle-slider {
  background: var(--success);
}
.toggle input:checked + .toggle-slider::before {
  transform: translateX(20px);
}

/* ─── Buttons ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  transition: all .15s;
  outline: none;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled {
  background: var(--gray-300);
  cursor: not-allowed;
  transform: none;
}
.btn-success {
  background: var(--success);
  color: white;
}
.btn-success:hover { background: #2d9249; }
.btn-outline {
  background: white;
  color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-outline:hover { background: var(--primary-light); }
.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

/* ─── Upload Page ─── */
.dir-picker {
  display: flex;
  gap: 10px;
  align-items: center;
}
.dir-picker input {
  flex: 1;
}
.apk-list {
  margin-top: 12px;
}
.apk-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  font-size: 13px;
}
.apk-item-name {
  font-weight: 500;
  color: var(--gray-800);
  word-break: break-all;
}
.apk-item-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-shrink: 0;
  margin-left: 12px;
}
.channel-badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.channel-badge.detected {
  background: var(--primary-light);
  color: var(--primary);
}
.channel-badge.unknown {
  background: var(--gray-100);
  color: var(--gray-500);
}
.apk-size {
  color: var(--gray-500);
  font-size: 12px;
}

/* ─── Store Checkboxes ─── */
.store-checkboxes {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.store-checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .15s;
  user-select: none;
}
.store-checkbox:hover { background: var(--gray-100); }
.store-checkbox input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--primary);
  cursor: pointer;
}
.store-checkbox label {
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
}
.store-checkbox.disabled {
  opacity: .45;
  pointer-events: none;
}

/* ─── Progress ─── */
.progress-list { margin-top: 16px; }
.progress-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.progress-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.progress-icon.pending { background: var(--gray-100); color: var(--gray-500); }
.progress-icon.uploading { background: var(--primary-light); color: var(--primary); }
.progress-icon.success { background: var(--success-light); color: var(--success); }
.progress-icon.failed { background: var(--danger-light); color: var(--danger); }
.progress-icon.skipped { background: var(--warning-light); color: var(--warning); }
.progress-info { flex: 1; }
.progress-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-800);
}
.progress-msg {
  font-size: 12px;
  color: var(--gray-500);
  margin-top: 2px;
}

/* spinner */
@keyframes spin {
  to { transform: rotate(360deg); }
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--gray-300);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}

/* ─── Toast ─── */
.toast-container {
  position: fixed;
  top: 72px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: slideIn .25s ease;
  max-width: 360px;
}
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--danger); color: white; }
.toast.info { background: var(--primary); color: white; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ─── Hidden store panel ─── */
.store-panel { display: none; }
.store-panel.active { display: block; }

/* ─── Responsive ─── */
@media (max-width: 640px) {
  .header { padding: 0 16px; }
  .container { padding: 0 12px; }
  .store-checkboxes { grid-template-columns: repeat(2, 1fr); }
  .store-tabs { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-logo">
    <span>📦</span> AppStore Publisher
  </div>
  <nav class="nav-tabs">
    <div class="nav-tab active" data-page="settings" onclick="switchPage('settings')">⚙️ 配置</div>
    <div class="nav-tab" data-page="upload" onclick="switchPage('upload')">📤 上传</div>
  </nav>
</header>

<!-- Toast Container -->
<div class="toast-container" id="toasts"></div>

<div class="container">

<!-- ═══════════════════ Settings Page ═══════════════════ -->
<div class="page active" id="page-settings">
  <div class="card">
    <div class="card-title">🏪 商店配置</div>

    <!-- Store Tabs -->
    <div class="store-tabs" id="storeTabs">
      <div class="store-tab active" data-store="yingyongbao" onclick="switchStore('yingyongbao')">
        <span class="store-dot"></span> 应用宝
      </div>
      <div class="store-tab" data-store="huawei" onclick="switchStore('huawei')">
        <span class="store-dot"></span> 华为
      </div>
      <div class="store-tab" data-store="honor" onclick="switchStore('honor')">
        <span class="store-dot"></span> 荣耀
      </div>
      <div class="store-tab" data-store="vivo" onclick="switchStore('vivo')">
        <span class="store-dot"></span> vivo
      </div>
      <div class="store-tab" data-store="oppo" onclick="switchStore('oppo')">
        <span class="store-dot"></span> OPPO
      </div>
      <div class="store-tab" data-store="xiaomi" onclick="switchStore('xiaomi')">
        <span class="store-dot"></span> 小米
      </div>
    </div>

    <!-- 应用宝 -->
    <div class="store-panel active" id="panel-yingyongbao">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">启用应用宝</div>
          <div class="toggle-desc">腾讯应用宝渠道发布</div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-field="yingyongbao.enabled" checked>

      <div class="form-group">
        <label class="form-label">User ID</label>

      <div class="form-group">
        <label class="form-label">RSA Private Key</label>
        <textarea class="form-textarea" data-field="yingyongbao.private_key_pem" placeholder="粘贴 PEM 格式私钥&#10;-----BEGIN PRIVATE KEY-----&#10;...&#10;-----END PRIVATE KEY-----" rows="6"></textarea>
      </div>
    </div>

    <!-- 华为 -->
    <div class="store-panel" id="panel-huawei">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">启用华为</div>
          <div class="toggle-desc">华为 AppGallery 应用市场</div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-field="huawei.enabled" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">Client ID</label>
        <input class="form-input" data-field="huawei.client_id" placeholder="请输入 Client ID">
      </div>
      <div class="form-group">
        <label class="form-label">Client Secret</label>

      </div>
      <div class="form-group">
        <label class="form-label">App ID</label>
        <input class="form-input" data-field="huawei.app_id" placeholder="请输入 App ID">

    </div>

        </div>
        <label class="toggle">
          <input type="checkbox" data-field="honor.enabled" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">Client ID</label>
        <input class="form-input" data-field="honor.client_id" placeholder="请输入 Client ID">
      </div>
      <div class="form-group">
        <label class="form-label">Client Secret</label>
        <input class="form-input" type="password" data-field="honor.client_secret" placeholder="请输入 Client Secret">
      </div>
      <div class="form-group">
        <label class="form-label">App ID</label>
        <input class="form-input" data-field="honor.app_id" placeholder="请输入 App ID">
      </div>
    </div>

    <!-- vivo -->
    <div class="store-panel" id="panel-vivo">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">启用 vivo</div>
          <div class="toggle-desc">vivo 应用商店</div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-field="vivo.enabled" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">Access Key</label>
        <input class="form-input" data-field="vivo.access_key" placeholder="请输入 Access Key">
      </div>
      <div class="form-group">
        <label class="form-label">Access Secret</label>
        <input class="form-input" type="password" data-field="vivo.access_secret" placeholder="请输入 Access Secret">
      </div>
    </div>

    <!-- OPPO -->
    <div class="store-panel" id="panel-oppo">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">启用 OPPO</div>
          <div class="toggle-desc">OPPO 应用商店</div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-field="oppo.enabled" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">Client ID</label>
        <input class="form-input" data-field="oppo.client_id" placeholder="请输入 Client ID">
      </div>
      <div class="form-group">
        <label class="form-label">Client Secret</label>
        <input class="form-input" type="password" data-field="oppo.client_secret" placeholder="请输入 Client Secret">
      </div>
    </div>

    <!-- 小米 -->
    <div class="store-panel" id="panel-xiaomi">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">启用小米</div>
          <div class="toggle-desc">小米应用商店</div>
        </div>
        <label class="toggle">

          <span class="toggle-slider"></span>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
    </div>
  </div>
</div>

<!-- ═══════════════════ Upload Page ═══════════════════ -->
<div class="page" id="page-upload">
  <div class="card">
    <div class="card-title">📁 APK 文件</div>
    <div class="dir-picker">
      <input class="form-input" id="apkDir" placeholder="输入 APK 文件夹路径，例如: /home/user/apks">
      <button class="btn btn-outline" onclick="scanDir()">🔍 扫描</button>
    </div>
    <div class="apk-list" id="apkList"></div>
  </div>

  <div class="card">
    <div class="card-title">📝 发布信息</div>
    <div class="form-group">
      <label class="form-label">更新日志 (Changelog)</label>
      <textarea class="form-textarea" id="changelog" placeholder="请输入本次更新内容描述..." rows="4"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">版本号 (Version)</label>
      <input class="form-input" id="versionName" placeholder="例如: 1.2.0">
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎯 目标商店</div>
    <div class="store-checkboxes" id="storeCheckboxes">
      <!-- filled by JS -->
    </div>
  </div>

  <div class="card">
    <button class="btn btn-success" id="uploadBtn" onclick="startUpload()" style="width:100%;justify-content:center;padding:12px;">
      🚀 开始上传
    </button>
  </div>

  <!-- Progress -->
  <div class="card" id="progressCard" style="display:none;">
    <div class="card-title">📊 上传进度</div>
    <div class="progress-list" id="progressList"></div>
  </div>
</div>

</div><!-- /container -->

<script>
// ═══════════════════ State ═══════════════════
let config = {};
let currentStore = 'yingyongbao';
let statusTimer = null;

const STORE_DISPLAY = {
  yingyongbao: '应用宝', huawei: '华为', honor: '荣耀',
  vivo: 'vivo', oppo: 'OPPO', xiaomi: '小米'
};

// ═══════════════════ Init ═══════════════════
document.addEventListener('DOMContentLoaded', async () => {
  await loadConfig();
  renderCheckboxes();
});

// ═══════════════════ Page/Tab switching ═══════════════════
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelector(`.nav-tab[data-page="${page}"]`).classList.add('active');

  if (page === 'upload') {
    renderCheckboxes();
  }
}

function switchStore(store) {
  currentStore = store;
  document.querySelectorAll('.store-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.store-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.store-tab[data-store="${store}"]`).classList.add('active');
  document.getElementById('panel-' + store).classList.add('active');
}

// ═══════════════════ Config ═══════════════════
async function loadConfig() {
  try {
    const resp = await fetch('/api/config');
    config = await resp.json();
    populateForm();
    updateStoreDots();
  } catch (e) {
    toast('加载配置失败: ' + e.message, 'error');
  }
}

function populateForm() {
  document.querySelectorAll('[data-field]').forEach(el => {
    const parts = el.dataset.field.split('.');
    let val = config;
    for (const p of parts) {
      val = val?.[p];
    }
    if (el.type === 'checkbox') {
      el.checked = val !== false;
    } else {
      el.value = val ?? '';
    }
  });
}

function collectConfig() {
  const result = JSON.parse(JSON.stringify(config));
  document.querySelectorAll('[data-field]').forEach(el => {
    const parts = el.dataset.field.split('.');
    let obj = result;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!obj[parts[i]]) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    if (el.type === 'checkbox') {
      obj[parts[parts.length - 1]] = el.checked;
    } else {
      obj[parts[parts.length - 1]] = el.value;
    }
  });
  return result;
}

async function saveConfig() {
  const data = collectConfig();
  try {
    const resp = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const result = await resp.json();
    if (result.ok) {
      config = data;
      updateStoreDots();
      toast('✅ 配置已保存', 'success');
    } else {
      toast('保存失败: ' + (result.error || '未知错误'), 'error');
    }
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  }
}

function updateStoreDots() {
  document.querySelectorAll('.store-tab').forEach(tab => {
    const store = tab.dataset.store;
    const enabled = config[store]?.enabled !== false;
    tab.classList.toggle('enabled', enabled);
  });
}

// ═══════════════════ Scan ═══════════════════
async function scanDir() {
  const dir = document.getElementById('apkDir').value.trim();
  if (!dir) {
    toast('请输入 APK 目录路径', 'error');
    return;
  }

  try {
    const resp = await fetch('/api/scan?dir=' + encodeURIComponent(dir));
    const data = await resp.json();

    if (data.error) {
      toast(data.error, 'error');
      return;
    }

    renderApkList(data.apks);

    // Auto-detect version from first APK
    if (data.apks.length > 0 && !document.getElementById('versionName').value) {
      const fname = data.apks[0].filename;
      const verMatch = fname.match(/(\d+\.\d+\.\d+)/);
      if (verMatch) {
        document.getElementById('versionName').value = verMatch[1];
      }
    }

    toast(`🔍 发现 ${data.apks.length} 个 APK 文件`, 'info');
  } catch (e) {
    toast('扫描失败: ' + e.message, 'error');
  }
}

function renderApkList(apks) {
  const container = document.getElementById('apkList');
  if (!apks.length) {
    container.innerHTML = '<div style="color:var(--gray-500);font-size:13px;padding:12px 0;">未发现 APK 文件</div>';
    return;
  }
  container.innerHTML = apks.map(apk => `
    <div class="apk-item">
      <span class="apk-item-name">${esc(apk.filename)}</span>
      <div class="apk-item-meta">
        <span class="channel-badge ${apk.channel ? 'detected' : 'unknown'}">
          ${apk.channel_display}
        </span>
        <span class="apk-size">${apk.size_display}</span>
      </div>
    </div>
  `).join('');
}

// ═══════════════════ Upload ═══════════════════
function renderCheckboxes() {
  const container = document.getElementById('storeCheckboxes');
  const stores = ['yingyongbao', 'huawei', 'honor', 'vivo', 'oppo', 'xiaomi'];
  container.innerHTML = stores.map(s => {
    const enabled = config[s]?.enabled !== false;
    return `
      <div class="store-checkbox ${enabled ? '' : 'disabled'}">
        <input type="checkbox" id="cb-${s}" value="${s}" ${enabled ? 'checked' : ''} ${!enabled ? 'disabled' : ''}>
        <label for="cb-${s}">${STORE_DISPLAY[s]}</label>
      </div>
    `;
  }).join('');
}

async function startUpload() {
  const apkDir = document.getElementById('apkDir').value.trim();
  const changelog = document.getElementById('changelog').value.trim();
  const version = document.getElementById('versionName').value.trim();

  const targetStores = [];
  document.querySelectorAll('#storeCheckboxes input[type="checkbox"]:checked').forEach(cb => {
    targetStores.push(cb.value);
  });

  if (!apkDir) {
    toast('请先选择 APK 目录并扫描', 'error');
    return;
  }
  if (!targetStores.length) {
    toast('请至少选择一个目标商店', 'error');
    return;
  }

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> 上传中...';

  try {
    const resp = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        apk_dir: apkDir,
        changelog,
        version,
        target_stores: targetStores,
      }),
    });
    const result = await resp.json();

    if (result.ok) {
      document.getElementById('progressCard').style.display = 'block';
      toast('🚀 上传任务已启动', 'info');
      pollStatus();
    } else {
      toast('启动失败: ' + (result.error || '未知错误'), 'error');
      resetUploadBtn();
    }
  } catch (e) {
    toast('请求失败: ' + e.message, 'error');
    resetUploadBtn();
  }
}

function pollStatus() {
  if (statusTimer) clearInterval(statusTimer);
  statusTimer = setInterval(async () => {
    try {
      const resp = await fetch('/api/status');
      const data = await resp.json();
      renderProgress(data.progress);

      if (data.done) {
        clearInterval(statusTimer);
        statusTimer = null;
        resetUploadBtn();
        const allSuccess = data.progress.every(p => p.status === 'success' || p.status === 'skipped');
        const anyFailed = data.progress.some(p => p.status === 'failed');
        if (allSuccess && !anyFailed) {
          toast('🎉 全部上传完成!', 'success');
        } else {
          toast('⚠️ 上传完成，部分失败', 'error');
        }
      }
    } catch (e) {
      // ignore poll errors
    }
  }, 1000);
}

function renderProgress(items) {
  const container = document.getElementById('progressList');
  const icons = {
    pending: '⏳', uploading: '🔄', success: '✅', failed: '❌', skipped: '⏭️'
  };
  container.innerHTML = items.map(item => `
    <div class="progress-item">
      <div class="progress-icon ${item.status}">
        ${item.status === 'uploading' ? '<div class="spinner"></div>' : (icons[item.status] || '❓')}
      </div>
      <div class="progress-info">
        <div class="progress-name">${esc(item.store_display)}</div>
        <div class="progress-msg">${esc(item.message)}</div>
      </div>
    </div>
  `).join('');
}

function resetUploadBtn() {
  const btn = document.getElementById('uploadBtn');
  btn.disabled = false;
  btn.innerHTML = '🚀 开始上传';
}

// ═══════════════════ Toast ═══════════════════
function toast(msg, type = 'info') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ═══════════════════ Utils ═══════════════════
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
</script>
